<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta http-equiv="Cache-Control" content="no-store, no-cache, must-revalidate" />
  <meta http-equiv="Pragma" content="no-cache" />
  <title>健保診所給付規定查詢</title>
  <meta name="description" content="快速查詢台灣健保檢驗、影像、處置項目的給付頻率、點數與對應診斷代碼。" />
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://cdn.jsdelivr.net/npm/fuse.js@7.0.0/dist/fuse.min.js"></script>
  <script>
    tailwind.config = {
      darkMode: 'class',
      theme: {
        extend: {
          colors: {
            brand: {
              50:  '#f0f9ff',
              100: '#e0f2fe',
              500: '#0ea5e9',
              600: '#0284c7',
              700: '#0369a1',
            }
          }
        }
      }
    }
  </script>
  <style>
    /* Hide scrollbar for Chrome/Safari on sidebar */
    .scroll-thin::-webkit-scrollbar { width: 6px; }
    .scroll-thin::-webkit-scrollbar-thumb { background: rgba(100,116,139,.4); border-radius: 4px; }
    .kbd { font-family: ui-monospace, SFMono-Regular, Menlo, monospace; font-size: 0.75rem; padding: 1px 6px; border: 1px solid rgb(203 213 225); border-radius: 4px; background: #fff; }
    .dark .kbd { background: #1e293b; border-color: #334155; color: #cbd5e1; }
    /* card hover */
    .card { transition: all .15s ease; }
    .card:hover { transform: translateY(-1px); }
  </style>
</head>
<body class="bg-slate-50 dark:bg-slate-900 text-slate-800 dark:text-slate-100 min-h-screen">

  <!-- Header -->
  <header class="sticky top-0 z-30 bg-white/90 dark:bg-slate-900/90 backdrop-blur border-b border-slate-200 dark:border-slate-700">
    <div class="max-w-7xl mx-auto px-4 py-3 flex items-center gap-3">
      <div class="flex items-center gap-2">
        <span class="text-2xl">🩺</span>
        <h1 class="text-lg md:text-xl font-bold text-brand-700 dark:text-brand-500">健保給付查詢</h1>
      </div>
      <div class="flex-1 relative">
        <input id="searchInput"
          type="search"
          autocomplete="off"
          spellcheck="false"
          placeholder="搜尋 HbA1c、糖化、09005C、高血壓…"
          class="w-full pl-10 pr-12 py-2 rounded-lg border border-slate-300 dark:border-slate-600 bg-white dark:bg-slate-800 focus:outline-none focus:ring-2 focus:ring-brand-500 focus:border-transparent"
        />
        <svg class="absolute left-3 top-1/2 -translate-y-1/2 w-5 h-5 text-slate-400" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
          <path stroke-linecap="round" stroke-linejoin="round" d="M21 21l-4.35-4.35M10.5 17a6.5 6.5 0 100-13 6.5 6.5 0 000 13z" />
        </svg>
        <span class="hidden md:inline absolute right-3 top-1/2 -translate-y-1/2 text-xs text-slate-400"><span class="kbd">/</span> 聚焦</span>
      </div>
      <button id="themeToggle" class="p-2 rounded-lg hover:bg-slate-100 dark:hover:bg-slate-800" title="切換深色模式">
        <span class="block dark:hidden">🌙</span>
        <span class="hidden dark:block">☀️</span>
      </button>
      <button id="mobileMenuBtn" class="md:hidden p-2 rounded-lg hover:bg-slate-100 dark:hover:bg-slate-800">☰</button>
    </div>
  </header>

  <div class="max-w-7xl mx-auto px-4 py-5 flex gap-5">

    <!-- Sidebar -->
    <aside id="sidebar" class="hidden md:block w-56 shrink-0 sticky top-20 self-start max-h-[calc(100vh-6rem)] overflow-y-auto scroll-thin">
      <nav class="space-y-1">
        <button data-filter="all" class="filter-btn w-full text-left px-3 py-2 rounded-lg hover:bg-slate-100 dark:hover:bg-slate-800 font-medium">📋 全部項目</button>
        <button data-filter="fav" class="filter-btn w-full text-left px-3 py-2 rounded-lg hover:bg-slate-100 dark:hover:bg-slate-800">⭐ 我的最愛 <span id="favCount" class="text-xs text-slate-400"></span></button>

        <div class="pt-3 pb-1 px-3 text-xs uppercase tracking-wide text-slate-500">依診斷查</div>
        <button data-filter="dx:E11" class="filter-btn w-full text-left px-3 py-1.5 rounded-lg hover:bg-slate-100 dark:hover:bg-slate-800 text-sm">🔍 糖尿病 (E11)</button>
        <button data-filter="dx:I10" class="filter-btn w-full text-left px-3 py-1.5 rounded-lg hover:bg-slate-100 dark:hover:bg-slate-800 text-sm">🔍 高血壓 (I10)</button>
        <button data-filter="dx:E78" class="filter-btn w-full text-left px-3 py-1.5 rounded-lg hover:bg-slate-100 dark:hover:bg-slate-800 text-sm">🔍 高血脂 (E78)</button>
        <button data-filter="dx:B18.1" class="filter-btn w-full text-left px-3 py-1.5 rounded-lg hover:bg-slate-100 dark:hover:bg-slate-800 text-sm">🔍 慢性B肝</button>
        <button data-filter="dx:N18" class="filter-btn w-full text-left px-3 py-1.5 rounded-lg hover:bg-slate-100 dark:hover:bg-slate-800 text-sm">🔍 CKD (N18)</button>
        <button data-filter="dx:E03" class="filter-btn w-full text-left px-3 py-1.5 rounded-lg hover:bg-slate-100 dark:hover:bg-slate-800 text-sm">🔍 甲低 (E03)</button>
        <button data-filter="dx:I48" class="filter-btn w-full text-left px-3 py-1.5 rounded-lg hover:bg-slate-100 dark:hover:bg-slate-800 text-sm">🔍 心房顫動</button>

        <div class="pt-3 pb-1 px-3 text-xs uppercase tracking-wide text-slate-500">檢驗</div>
        <button data-filter="lab:生化 / 糖尿病" class="filter-btn w-full text-left px-3 py-1.5 rounded-lg hover:bg-slate-100 dark:hover:bg-slate-800 text-sm">🩸 糖尿病</button>
        <button data-filter="lab:生化 / 血脂" class="filter-btn w-full text-left px-3 py-1.5 rounded-lg hover:bg-slate-100 dark:hover:bg-slate-800 text-sm">🩸 血脂</button>
        <button data-filter="lab:生化 / 腎功能" class="filter-btn w-full text-left px-3 py-1.5 rounded-lg hover:bg-slate-100 dark:hover:bg-slate-800 text-sm">🩸 腎功能</button>
        <button data-filter="lab:生化 / 肝功能" class="filter-btn w-full text-left px-3 py-1.5 rounded-lg hover:bg-slate-100 dark:hover:bg-slate-800 text-sm">🩸 肝功能</button>
        <button data-filter="lab:生化 / 電解質" class="filter-btn w-full text-left px-3 py-1.5 rounded-lg hover:bg-slate-100 dark:hover:bg-slate-800 text-sm">🩸 電解質</button>
        <button data-filter="lab:生化 / 代謝" class="filter-btn w-full text-left px-3 py-1.5 rounded-lg hover:bg-slate-100 dark:hover:bg-slate-800 text-sm">🩸 代謝</button>
        <button data-filter="lab:血液" class="filter-btn w-full text-left px-3 py-1.5 rounded-lg hover:bg-slate-100 dark:hover:bg-slate-800 text-sm">🩸 血液 / CBC</button>
        <button data-filter="lab:血液 / 發炎" class="filter-btn w-full text-left px-3 py-1.5 rounded-lg hover:bg-slate-100 dark:hover:bg-slate-800 text-sm">🩸 發炎指標</button>
        <button data-filter="lab:血液 / 凝血" class="filter-btn w-full text-left px-3 py-1.5 rounded-lg hover:bg-slate-100 dark:hover:bg-slate-800 text-sm">🩸 凝血</button>
        <button data-filter="lab:內分泌 / 甲狀腺" class="filter-btn w-full text-left px-3 py-1.5 rounded-lg hover:bg-slate-100 dark:hover:bg-slate-800 text-sm">🩸 甲狀腺</button>
        <button data-filter="lab:尿液" class="filter-btn w-full text-left px-3 py-1.5 rounded-lg hover:bg-slate-100 dark:hover:bg-slate-800 text-sm">🩸 尿液</button>
        <button data-filter="lab:尿液 / 糖尿病" class="filter-btn w-full text-left px-3 py-1.5 rounded-lg hover:bg-slate-100 dark:hover:bg-slate-800 text-sm">🩸 尿液 (微量蛋白)</button>
        <button data-filter="lab:感染 / 肝炎" class="filter-btn w-full text-left px-3 py-1.5 rounded-lg hover:bg-slate-100 dark:hover:bg-slate-800 text-sm">🩸 肝炎病毒</button>
        <button data-filter="lab:腫瘤標記" class="filter-btn w-full text-left px-3 py-1.5 rounded-lg hover:bg-slate-100 dark:hover:bg-slate-800 text-sm">🩸 腫瘤標記</button>

        <div class="pt-3 pb-1 px-3 text-xs uppercase tracking-wide text-slate-500">影像</div>
        <button data-filter="imaging:影像 / X 光" class="filter-btn w-full text-left px-3 py-1.5 rounded-lg hover:bg-slate-100 dark:hover:bg-slate-800 text-sm">📷 X 光</button>
        <button data-filter="imaging:影像 / 超音波" class="filter-btn w-full text-left px-3 py-1.5 rounded-lg hover:bg-slate-100 dark:hover:bg-slate-800 text-sm">📷 超音波</button>
        <button data-filter="imaging:影像 / 心電圖" class="filter-btn w-full text-left px-3 py-1.5 rounded-lg hover:bg-slate-100 dark:hover:bg-slate-800 text-sm">📷 心電圖</button>

        <div class="pt-3 pb-1 px-3 text-xs uppercase tracking-wide text-slate-500">處置 / 衛教</div>
        <button data-filter="procedure:處置 / 傷口" class="filter-btn w-full text-left px-3 py-1.5 rounded-lg hover:bg-slate-100 dark:hover:bg-slate-800 text-sm">🩹 傷口</button>
        <button data-filter="procedure:處置 / 注射" class="filter-btn w-full text-left px-3 py-1.5 rounded-lg hover:bg-slate-100 dark:hover:bg-slate-800 text-sm">💉 注射 / 點滴</button>
        <button data-filter="procedure:處置 / 呼吸" class="filter-btn w-full text-left px-3 py-1.5 rounded-lg hover:bg-slate-100 dark:hover:bg-slate-800 text-sm">💨 噴霧</button>
        <button data-filter="procedure:衛教 / 論質計酬" class="filter-btn w-full text-left px-3 py-1.5 rounded-lg hover:bg-slate-100 dark:hover:bg-slate-800 text-sm">🎓 衛教 (P4P)</button>
        <button data-filter="procedure:衛教 / 戒菸" class="filter-btn w-full text-left px-3 py-1.5 rounded-lg hover:bg-slate-100 dark:hover:bg-slate-800 text-sm">🚭 戒菸</button>
        <button data-filter="procedure:預防保健" class="filter-btn w-full text-left px-3 py-1.5 rounded-lg hover:bg-slate-100 dark:hover:bg-slate-800 text-sm">🛡️ 預防保健</button>
        <button data-filter="cat:癌症篩檢" class="filter-btn w-full text-left px-3 py-1.5 rounded-lg hover:bg-slate-100 dark:hover:bg-slate-800 text-sm">🛡️ 癌症篩檢</button>
      </nav>

      <div class="mt-6 p-3 rounded-lg bg-amber-50 dark:bg-amber-900/20 text-xs text-amber-800 dark:text-amber-200 border border-amber-200 dark:border-amber-800">
        ⚠️ 資料為整理版本，申報前請以
        <a href="https://info.nhi.gov.tw/INAE5000/INAE5001S01" target="_blank" class="underline font-medium">健保署官方查詢</a>
        為準。
      </div>
    </aside>

    <!-- Main content -->
    <main class="flex-1 min-w-0">
      <!-- Diagnosis banner (shown when filtering by dx) -->
      <div id="dxBanner" class="hidden mb-4 p-4 rounded-lg bg-brand-50 dark:bg-brand-700/20 border border-brand-200 dark:border-brand-700"></div>

      <div class="flex items-center justify-between mb-3">
        <h2 id="resultTitle" class="text-base md:text-lg font-semibold">全部項目</h2>
        <span id="resultCount" class="text-sm text-slate-500"></span>
      </div>

      <div id="resultList" class="grid gap-3"></div>

      <div id="emptyState" class="hidden text-center py-16 text-slate-400">
        <div class="text-5xl mb-3">🔎</div>
        <p>沒有找到符合的項目</p>
        <p class="text-xs mt-1">試試其他關鍵字，或改用代碼 (如 09005C)</p>
      </div>

      <footer class="mt-10 pt-6 border-t border-slate-200 dark:border-slate-700 text-xs text-slate-500 text-center space-y-1">
        <p>資料最後更新：<span id="updatedAt"></span></p>
        <p>© 健保給付查詢 · 僅供臨床參考 · 實際申報以健保署公告為準</p>
        <p><a href="https://github.com" class="underline" target="_blank">回報錯誤或建議</a></p>
      </footer>
    </main>
  </div>

  <!-- Detail Modal -->
  <div id="modal" class="hidden fixed inset-0 z-40 bg-black/50 flex items-center justify-center p-4">
    <div class="bg-white dark:bg-slate-800 rounded-xl max-w-2xl w-full max-h-[90vh] overflow-y-auto scroll-thin">
      <div class="sticky top-0 bg-white dark:bg-slate-800 border-b border-slate-200 dark:border-slate-700 px-5 py-3 flex items-start justify-between gap-3">
        <div class="min-w-0">
          <h3 id="modalTitle" class="text-lg font-bold truncate"></h3>
          <p id="modalSubtitle" class="text-sm text-slate-500 truncate"></p>
        </div>
        <button id="modalClose" class="p-2 rounded-lg hover:bg-slate-100 dark:hover:bg-slate-700 shrink-0">✕</button>
      </div>
      <div id="modalBody" class="p-5 space-y-4"></div>
    </div>
  </div>

  <script src="assets/app.js?v=2"></script>
</body>
</html>
